name: Publish Python Package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Build sdist and wheel
        run: |
          uv build
          echo "### 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Successfully built the following packages:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/
          if-no-files-found: error

  test:
    name: Test Distributions (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          # - macos-latest
        python-version:
          - '3.10'
          - '3.11'
          # - '3.12'
          # - '3.13'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test Wheel (.whl)
        id: test-wheel
        shell: bash
        run: |
          uv run --python ${{ matrix.python-version }} --isolated --no-project --with pytest --with dist/*.whl pytest tests/ 2>&1 | tee pytest_whl.log
          echo "✅ **Wheel (.whl)** test passed! (${{ matrix.os }} / Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY

      - name: Test Source Distribution (.tar.gz)
        id: test-sdist
        shell: bash
        run: |
          uv run --python ${{ matrix.python-version }} --isolated --no-project --with pytest --with dist/*.tar.gz pytest tests/ 2>&1 | tee pytest_sdist.log
          echo "✅ **Source Distribution (.tar.gz)** test passed! (${{ matrix.os }} / Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY

      - name: Report Test Results
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Test Status: ${{ matrix.os }} / Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.test-wheel.outcome }}" == "success" ]; then
            echo "✅ **Wheel (.whl)**: Test completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test-wheel.outcome }}" == "failure" ]; then
            echo "❌ **Wheel (.whl)**: Test failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand error logs</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat pytest_whl.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details><br>" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Wheel (.whl)**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.test-sdist.outcome }}" == "success" ]; then
            echo "✅ **Source Distribution (.tar.gz)**: Test completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test-sdist.outcome }}" == "failure" ]; then
            echo "❌ **Source Distribution (.tar.gz)**: Test failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand error logs</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat pytest_sdist.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details><br>" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Source Distribution (.tar.gz)**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

  scan-credentials:
    name: Scan for Hardcoded Secrets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Run TruffleHog Scan
        id: run-trufflehog
        run: |
          docker run --rm -v "${{ github.workspace }}:/pwd" trufflesecurity/trufflehog:latest filesystem /pwd/dist/ --archive-max-depth=2 --fail --github-actions
          echo "✅ **TruffleHog**: No verified secrets found in artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Run GitLeaks Scan
        id: run-gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" ghcr.io/gitleaks/gitleaks:latest dir /path/dist/ -c /path/.gitleaks.toml --max-archive-depth=2 --exit-code=1 --redact --verbose
          echo "✅ **GitLeaks**: No hardcoded secrets found in artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Report Scan Results
        if: always()
        run: |
          echo "## 🛡️ Credential Scan Status Report" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.run-trufflehog.outcome }}" == "success" ]; then
            echo "✅ **TruffleHog**: Scan passed, no secrets found" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run-trufflehog.outcome }}" == "failure" ]; then
            echo "🚨 **TruffleHog**: Active secrets detected!" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ *For security reasons, details are not printed here. Please check the workflow annotations or run TruffleHog locally.*" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **TruffleHog**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.run-gitleaks.outcome }}" == "success" ]; then
            echo "✅ **GitLeaks**: Scan passed, no hardcoded secrets found" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run-gitleaks.outcome }}" == "failure" ]; then
            echo "🚨 **GitLeaks**: Hardcoded secrets detected!" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ *For security reasons, details are not printed here. Please run GitLeaks locally to identify the secret.*" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **GitLeaks**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

  deploy-test:
    name: Deploy to Test PyPI
    needs: [test, scan-credentials]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      # NOTE: Replace `python-helloworld` with your actual package name to provide a direct link to the published package on Test PyPI
      url: https://test.pypi.org/project/python-helloworld/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Block publishing until Test PyPI is configured
        run: |
          echo "Test PyPI publishing is intentionally disabled." >&2
          echo "Before enabling this workflow, verify that the 'testpypi' environment is configured correctly," >&2
          echo "that the project has Trusted Publishing configured on Test PyPI," >&2
          echo "and that this repository should publish packages at all." >&2
          echo "If publishing is not needed, remove .github/workflows/publish.yaml." >&2
          exit 1

      # NOTE: To enable Test PyPI publishing, remove the blocking step above.
      - name: Publish to Test PyPI
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/
          echo "### 🧪 Test PyPI Publish Successful" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to PyPI
    needs: deploy-test
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      # NOTE: Replace `python-helloworld` with your actual package name to provide a direct link to the published package on PyPI
      url: https://pypi.org/project/python-helloworld/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Block publishing until PyPI is configured
        run: |
          echo "PyPI publishing is intentionally disabled." >&2
          echo "Before enabling this workflow, verify that the 'pypi' environment is configured correctly," >&2
          echo "that the project has Trusted Publishing configured on PyPI," >&2
          echo "and that this repository should publish packages at all." >&2
          echo "If publishing is not needed, remove .github/workflows/publish.yaml." >&2
          exit 1

      # NOTE: To enable PyPI publishing, remove the blocking step above.
      - name: Publish to PyPI
        run: |
          uv publish
          echo "### 🚀 PyPI Publish Successful" >> $GITHUB_STEP_SUMMARY
