name: Test

on:
  push:
    tags:
      - '*'
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          # - windows-latest
          # - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run pytest and report coverage
        shell: bash
        run: |
          echo "### 🧪 Coverage on ${{ matrix.os }} / Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY

          set +e
          uv run pytest --cov=src --cov-report=term
          TEST_EXIT_CODE=$?
          set -e

          if [ -f ".coverage" ]; then
            uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || echo "⚠️ Coverage report failed (possibly due to earlier test errors or missing data)." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage data found; coverage report was not generated." >> $GITHUB_STEP_SUMMARY
          fi

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "❌ **Tests failed. Check the logs for details.**" >> $GITHUB_STEP_SUMMARY
            exit $TEST_EXIT_CODE
          else
            echo "✅ **All tests passed successfully.**" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build Distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Build sdist and wheel
        shell: bash
        run: |
          echo "### 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          uv build
          echo "Successfully built the following packages:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/
          if-no-files-found: error

  distributions-test:
    name: Test Distributions
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          # - macos-latest
        python-version:
          - '3.10'
          - '3.11'
          # - '3.12'
          # - '3.13'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test Wheel (.whl)
        id: test-wheel
        shell: bash
        run: |
          uv run --python ${{ matrix.python-version }} --isolated --no-project --with pytest --with dist/*.whl pytest tests/ 2>&1 | tee pytest_whl.log
          echo "✅ **Wheel (.whl)** test passed! (${{ matrix.os }} / Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY

      - name: Test Source Distribution (.tar.gz)
        id: test-sdist
        shell: bash
        run: |
          uv run --python ${{ matrix.python-version }} --isolated --no-project --with pytest --with dist/*.tar.gz pytest tests/ 2>&1 | tee pytest_sdist.log
          echo "✅ **Source Distribution (.tar.gz)** test passed! (${{ matrix.os }} / Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY

      - name: Report Test Results (${{ matrix.os }} / Python ${{ matrix.python-version }})
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Test Status: ${{ matrix.os }} / Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.test-wheel.outcome }}" == "success" ]; then
            echo "✅ **Wheel (.whl)**: Test completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test-wheel.outcome }}" == "failure" ]; then
            echo "❌ **Wheel (.whl)**: Test failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand error logs</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat pytest_whl.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details><br>" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Wheel (.whl)**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.test-sdist.outcome }}" == "success" ]; then
            echo "✅ **Source Distribution (.tar.gz)**: Test completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test-sdist.outcome }}" == "failure" ]; then
            echo "❌ **Source Distribution (.tar.gz)**: Test failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand error logs</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat pytest_sdist.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details><br>" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Source Distribution (.tar.gz)**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

  scan-credentials:
    name: Scan for Hardcoded Secrets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Run TruffleHog Scan
        id: run-trufflehog
        run: |
          docker run --rm -v "${{ github.workspace }}:/pwd" trufflesecurity/trufflehog:latest filesystem /pwd/dist/ --archive-max-depth=2 --fail --github-actions
          echo "✅ **TruffleHog**: No verified secrets found in artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Run GitLeaks Scan
        id: run-gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" ghcr.io/gitleaks/gitleaks:latest dir /path/dist/ -c /path/.gitleaks.toml --max-archive-depth=2 --exit-code=1 --redact --verbose
          echo "✅ **GitLeaks**: No hardcoded secrets found in artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Report Scan Results
        if: always()
        run: |
          echo "## 🛡️ Credential Scan Status Report" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.run-trufflehog.outcome }}" == "success" ]; then
            echo "✅ **TruffleHog**: Scan passed, no secrets found" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run-trufflehog.outcome }}" == "failure" ]; then
            echo "🚨 **TruffleHog**: Active secrets detected!" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ *For security reasons, details are not printed here. Please run TruffleHog locally to identify the secret.*" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **TruffleHog**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.run-gitleaks.outcome }}" == "success" ]; then
            echo "✅ **GitLeaks**: Scan passed, no hardcoded secrets found" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run-gitleaks.outcome }}" == "failure" ]; then
            echo "🚨 **GitLeaks**: Hardcoded secrets detected!" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ *For security reasons, details are not printed here. Please run GitLeaks locally to identify the secret.*" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **GitLeaks**: Skipped due to previous step failure" >> $GITHUB_STEP_SUMMARY
          fi
