[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = ["tests"]

[tool.ty.src]
include = ["src", "tests"]
exclude = [
    ".agents",
    # NOTE: remove if you don't have scripts directory
    "scripts",
    # NOTE: remove if you don't have notebooks directory
    "notebooks",
]

[tool.ruff]
line-length = 120
extend-exclude = [
    ".agents",
    # Example: Ignore gRPC generated files
    # "*_pb2.py",
    # "*_pb2_grpc.py",
]

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 80

[tool.ruff.lint]
extend-select = [
    "E",    # pycodestyle error: PEP 8 styling errors
    "I",    # isort: Import sorting
    "N",    # pep8-naming: Check PEP 8 naming conventions
    "S",    # flake8-bandit: Security testing
    "T10",  # flake8-debugger: Check for debugger imports and set_trace calls
    "T20",  # flake8-print: Check for print statements
    "TID",  # flake8-tidy-imports: Tidy up imports
    "UP",   # pyupgrade: Upgrade syntax for newer Python versions
    "W",    # pycodestyle warning: PEP 8 styling warnings
]
# ignore = [
#     "S105", # hardcoded-password-string: Check for hardcoded passwords in strings
#     "S106", # hardcoded-password-func-arg: Check for hardcoded passwords in function arguments
#     "S107", # hardcoded-password-default: Check for hardcoded passwords in default arguments
# ]
unfixable = [
    "F401", # unused-import: Unused import
]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = [
    "T201",     # print: print found
]
"tests/**/*" = [
    "S",        # flake8-bandit: Security testing
    "TID252",   # relative-imports: Relative imports ban
]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"
